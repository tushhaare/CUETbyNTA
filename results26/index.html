
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CUET Result Tracker 2026 | CUETbyNTA</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bg-grid"></div>

<header class="topbar">
  <div class="brand">
    <div class="dot"></div>
    <div>
      <h1>CUETbyNTA</h1>
      <p>CUET Result Tracker 2026</p>
    </div>
  </div>
</header>

<main class="container">
  <section class="hero">
    <h2>CUET UG Result Status</h2>
    <p>Stop refreshing the official website. This tracker checks for result availability automatically.</p>

    <div id="status" class="status not-released">🔴 RESULT NOT RELEASED</div>
    <a id="resultBtn" class="btn" href="#" target="_blank">Open Official Result</a>
<br>
<button id="enableNotifications" class="notify-btn">
    🔔 Enable Result Alerts
</button>
  </section>

  <section class="stats">
    <div class="card">
    <span>Last Scan</span>
    <strong id="lastChecked">Loading...</strong>
</div>

<div class="card">
    <span>Next Check</span>
    <strong id="countdown">30s</strong>
</div>
    <div class="card"><span>Status</span><strong id="systemStatus">Active</strong></div>
  </section>

  <section class="feed">
    <h3>Live Activity</h3>
    <div id="feedItems">
      <div class="feed-item">Tracker initialized.</div>
    </div>
  </section>

<section class="banner">
    <a href="#" target="_blank">
        <img
            src="23june.png"
            alt="Margdarshan 2026"
            class="banner-image"
        >
    </a>
</section>

<script src="script.js"></script>
</body>
</html>
